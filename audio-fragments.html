<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through the Gate — Audio Fragments</title>

    <link rel="preload" href="style.css" as="style">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" as="style">

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .audio-back {
            position: fixed;
            top: 2.5rem;
            left: 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            transition: color 0.3s ease;
            z-index: 10;
        }

        .audio-back:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .audio-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5rem;
            padding: 2rem;
            width: 100%;
            max-width: 560px;
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
        }

        .audio-header {
            text-align: center;
        }

        .audio-header .title {
            opacity: 1;
            white-space: normal;
            margin-bottom: 1.2rem;
            font-size: clamp(1.6rem, 4vw, 2.8rem);
        }

        .audio-header .subtitle-info {
            opacity: 0.85;
        }

        .player-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
            width: 100%;
        }

        .track-info {
            text-align: center;
        }

        .track-label {
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 0.9rem;
        }

        .track-artists {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.1rem, 2vw, 1.4rem);
            font-weight: 300;
            letter-spacing: 0.08em;
            color: rgba(255, 255, 255, 0.75);
            font-style: italic;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            width: 100%;
        }

        .play-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: rgba(255, 255, 255, 0.8);
            width: 5rem;
            height: 5rem;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.4s ease, color 0.4s ease, transform 0.3s ease;
            flex-shrink: 0;
        }

        .play-btn:hover {
            border-color: rgba(255, 255, 255, 0.7);
            color: var(--white);
            transform: scale(1.05);
        }

        .play-btn svg {
            width: 1.4rem;
            height: 1.4rem;
        }

        .play-btn .icon-play {
            display: block;
            margin-left: 0.2rem;
        }

        .play-btn .icon-pause {
            display: none;
        }

        .play-btn.playing .icon-play {
            display: none;
        }

        .play-btn.playing .icon-pause {
            display: block;
            margin-left: 0;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
        }

        .time-display {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: rgba(255, 255, 255, 0.35);
            min-width: 2.8rem;
            text-align: right;
        }

        .time-display.duration {
            text-align: left;
        }

        .progress-container {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
            position: relative;
            transition: height 0.2s ease;
        }

        .progress-container:hover {
            height: 2px;
        }

        .progress-bar {
            height: 100%;
            background: rgba(255, 255, 255, 0.6);
            width: 0%;
            transition: width 0.1s linear;
            pointer-events: none;
        }

        .progress-container:hover .progress-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        @media (max-width: 768px) {
            .audio-back {
                top: 1.5rem;
                left: 1.5rem;
            }

            .audio-page {
                gap: 3.5rem;
            }

            .play-btn {
                width: 4.5rem;
                height: 4.5rem;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="audio-back">← Back</a>

    <audio id="audioPlayer" preload="none"></audio>

    <main class="audio-page">
        <div class="audio-header">
            <h1 class="title">THROUGH THE GATE</h1>
            <p class="subtitle-info">STILL IN MOTION — 18.05.2026 – 31.05.2026</p>
        </div>

        <div class="player-wrapper">
            <div class="track-info">
                <p class="track-label">Audio Fragments</p>
                <p class="track-artists">Anna Brear &amp; Ilari Heinilä</p>
            </div>

            <div class="player-controls">
                <button class="play-btn" id="playBtn" aria-label="Play">
                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="5" y="3" width="4" height="18"/>
                        <rect x="15" y="3" width="4" height="18"/>
                    </svg>
                </button>

                <div class="progress-section">
                    <span class="time-display" id="currentTime">0:00</span>
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <span class="time-display duration" id="duration">—</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');

        audio.src = 'Track/Anna%20Brear%2C%20Ilari%20Heinil%C3%A4%20-%20Audio%20fragments%20-%20M1%20-%20110526%20-16lufs.wav';

        function formatTime(s) {
            if (!isFinite(s)) return '—';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60).toString().padStart(2, '0');
            return `${m}:${sec}`;
        }

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.classList.add('playing');
                playBtn.setAttribute('aria-label', 'Pause');
            } else {
                audio.pause();
                playBtn.classList.remove('playing');
                playBtn.setAttribute('aria-label', 'Play');
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = pct + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            playBtn.classList.remove('playing');
            playBtn.setAttribute('aria-label', 'Play');
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            audio.currentTime = ratio * audio.duration;
        });
    </script>
</body>
</html>
